name: Prime Choice Application Deployment

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'terraform/**'

env:
  AWS_REGION: us-east-1
  DOCKERHUB_USERNAME: cytemi5000
  IMAGE_NAME: primechoice
  EKS_CLUSTER_NAME: my-cluster

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER_NAME
          kubectl get nodes

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build --no-cache \
            -t $DOCKERHUB_USERNAME/$IMAGE_NAME:${{ github.sha }} .

      - name: Scan Image with Trivy
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Push Docker Image
        run: |
          docker push $DOCKERHUB_USERNAME/$IMAGE_NAME:${{ github.sha }}

      - name: Update Deployment Image
        working-directory: kubernetes
        run: |
          sed -i "s|image: .*|image: $DOCKERHUB_USERNAME/$IMAGE_NAME:${{ github.sha }}|g" django-deployment.yaml
     
      - name: Delete old postrgres 
        working-directory: kubernetes
        run: |
         kubectl delete pvc postgres-pvc -n django-app --ignore-not-found
         kubectl delete deployment postgres -n django-app --ignore-not-found
      - name: Deploy to EKS
        working-directory: kubernetes
        run: |
          kubectl apply -f namespace.yaml
          kubectl apply -f django-configmap.yaml
          kubectl apply -f postgres-secret.yaml
          kubectl apply -f django-secret.yaml
          kubectl apply -f postgres-pvc.yaml
          kubectl apply -f postgres-deployment.yaml
          kubectl apply -f postgres-service.yaml
          kubectl apply -f django-deployment.yaml
          kubectl apply -f django-service.yaml

      - name: Wait for Postgres
        run: |
          kubectl rollout status deployment/postgres -n django-app --timeout=300s

      - name: Wait for Django
        run: |
          kubectl rollout status deployment/django -n django-app --timeout=300s

      - name: Debug (if failed)
        if: failure()
        run: |
          kubectl get secret postgres-secret -n django-app -o yaml
          kubectl get pods -n django-app
          kubectl describe pods -n django-app
          kubectl logs -n django-app --all-containers --tail=100 || true
          kubectl logs postgres-69bccf87f8-ncgkh -n django-app